name: Monthly Market Data Update

on:
  # Runs at 6:00 AM ET on the 1st of every month
  schedule:
    - cron: '0 11 1 * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (fetch data but do not write to Sanity)'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-market-data:
    name: Fetch & Update Market Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas python-dateutil sanity-client 2>/dev/null || \
          pip install requests pandas python-dateutil

      - name: Fetch Zillow & Redfin market data
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET || 'production' }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python3 scripts/fetch_market_data.py

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Market data updated successfully for $(date '+%B %Y')"
          echo "Data written to Sanity CMS for all 25 communities."

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Market data update failed. Check logs above."
          echo "The site will continue to show the previous month's data."
